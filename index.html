<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历智能优化助手</title>
    <!-- 引入扣子 Web SDK -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.0.0-beta.18/libs/cn/index.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6f8; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #fff; color: #333; border: 1px solid #d0d5dd; }
        .btn-secondary:hover { background: #f9fafb; }
        .main { flex: 1; overflow: hidden; }
        #chatContainer { height: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📄 简历智能优化助手</h1>
        <div class="btn-group">
            <button class="btn btn-primary" id="downloadBtn">⬇️ 下载Word简历</button>
        </div>
    </div>
    <div class="main">
        <div id="chatContainer"></div>
    </div>

    <script>
        // ==================== 配置区域 ====================
        const BOT_ID = "7638877866679877683";
        const API_TOKEN = "pat_KhBl8rN8c4PW6y5EjTm8wqJU4kUyB1rYFF5YzUNhItL4Acpukvg11Qhrymx7fy9";
        // ==================================================

        // 初始化 Coze Chat 客户端
        const chatClient = new CozeWebSDK.WebChatClient({
            botId: BOT_ID,
            token: API_TOKEN,
            container: document.getElementById('chatContainer'),
            config: {
                // 自动展开文件上传按钮
                uploadFile: {
                    enable: true,
                    accept: '.docx,.pdf,.txt,.jpg,.png',
                    maxSize: 10 * 1024 * 1024 // 10MB
                },
                // 自定义问候语
                greeting: '你好！我是你的简历优化助手。直接上传你的简历文件（Word/PDF/图片），然后告诉我目标岗位的 JD，我会立刻为你优化。',
                // 可以直接点击的快捷指令
                shortcuts: [
                    '这是我的简历，帮我优化',
                    '这是目标岗位JD，为我匹配',
                    '把这段经历写得更量化',
                    '满意，请帮我生成Word文件'
                ],
                // 设置流式传输
                streaming: true,
                // 聊天窗口样式
                chatBotName: '简历优化专家',
                // 允许用户输入
                allowTextInput: true,
                // 显示复制/下载按钮
                showCopyButton: true
            }
        });

        // 启动聊天
        chatClient.init().catch(error => {
            console.error('Coze Chat 初始化失败:', error);
            alert('聊天服务加载失败，请检查 Bot ID 和 Token 是否正确，并确认已发布到 Chat SDK 渠道。');
        });

        // ---- 下载Word简历功能 ----
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            try {
                // 获取所有消息
                const messages = await chatClient.getMessages();
                if (!messages || messages.length === 0) {
                    alert('暂无对话内容，请先生成优化简历。');
                    return;
                }

                // 找到最后一条助手消息（AI 的回复）
                let lastAssistantMessage = null;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].role === 'assistant') {
                        lastAssistantMessage = messages[i].content;
                        break;
                    }
                }

                if (!lastAssistantMessage || lastAssistantMessage.trim().length === 0) {
                    alert('没有找到优化后的简历内容，请先与助手对话。');
                    return;
                }

                // 构造 Word 文档（HTML 格式）
                const htmlContent = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office"
                          xmlns:w="urn:schemas-microsoft-com:office:word"
                          xmlns="http://www.w3.org/TR/REC-html40">
                    <head><meta charset="UTF-8"><title>优化简历</title></head>
                    <body style="font-family: '微软雅黑', sans-serif; font-size: 14px; line-height: 1.6;">
                        ${lastAssistantMessage.replace(/\n/g, '<br>')}
                    </body></html>
                `;

                // 生成 Blob 并下载
                const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const now = new Date();
                const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
                a.href = url;
                a.download = `优化简历-${dateStr}.doc`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('下载出错:', error);
                alert('下载失败，请重试或检查控制台错误。');
            }
        });
    </script>
</body>
</html>
